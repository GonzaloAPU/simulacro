<p>recipes works!</p>

<div class="mb-3">
  <label for="anio" class="form-label small opacity-75">Ingresá el Año:</label>
  <input
    type="text"
    id="anio"
    name="recipe"
    class="form-control"
    [(ngModel)]="name"
    placeholder="Pizza"
    style="max-width: 200px;"
  >
</div>

<button (click)="getApiRecipes()" class="btn btn-primary">Consultar</button>


<table class="table table-striped table-bordered align-middle">

      <thead class="table-dark">
        <tr>
          <th>Name</th>
          <th>Description</th>
          <th>Ingredientes</th>
          <th>Imagen</th>
          <th>Detalle</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let recipesrank of listarecipes">
          <td>
            {{ recipesrank.name}}
          </td>
          <td>
            {{recipesrank.description}}
          </td>
          <td>
            <div *ngFor="let ingredientes of recipesrank.ingredients">
              {{ingredientes.name}}

            </div>

          </td>
          <td>
            <div *ngFor="let steps of recipesrank.steps">
              {{steps[0]}}

            </div>

          </td>
          <td>
            <div class="me-3">
              <img
              [src]="recipesrank.image"
              class="img-fluid rounded"
              style="max-width: 80px; height: auto; object-fit: cover;"
              >
            </div>
          </td>

        </tr>
      </tbody>

    </table>
